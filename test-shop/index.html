<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    color: #111;
  }
  .container { max-width: 1120px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 16px 0;
    margin-bottom: 32px;
  }
  header .container { display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { font-size: 13px; color: #666; }

  /* Admin form */
  .admin-panel {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
  }
  .admin-panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .admin-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .admin-form .full { grid-column: 1 / -1; }
  .admin-form label { font-size: 12px; font-weight: 500; color: #555; margin-bottom: 4px; display: block; }
  .admin-form input, .admin-form textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d4d4d4;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .admin-form input:focus, .admin-form textarea:focus { border-color: #111; }
  .admin-form textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  .admin-form button {
    grid-column: 1 / -1;
    padding: 10px 24px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .admin-form button:disabled { opacity: .5; cursor: not-allowed; }
  .admin-form button:hover:not(:disabled) { background: #333; }

  /* Product grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 48px;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    overflow: hidden;
  }
  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 13px;
  }
  .card-img video { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 14px 16px 16px; }
  .card-body h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .card-body .price { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .card-body p { font-size: 13px; color: #555; line-height: 1.4; }
  .card-body .meta { font-size: 11px; color: #999; margin-top: 8px; }

  .empty { text-align: center; padding: 64px 20px; color: #999; font-size: 14px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #111; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>Shop</h1>
    <span>Brand Store</span>
  </div>
</header>

<div class="container">

  <!-- Admin: add item -->
  <div class="admin-panel">
    <h2>Add Item</h2>
    <form id="addForm" class="admin-form">
      <div>
        <label for="title">Title</label>
        <input id="title" type="text" required placeholder="Product name">
      </div>
      <div>
        <label for="price">Price ($)</label>
        <input id="price" type="number" step="0.01" required placeholder="0.00">
      </div>
      <div class="full">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Product description..."></textarea>
      </div>
      <div class="full">
        <label for="file">Image or Video</label>
        <input id="file" type="file" accept="image/*,video/*" required>
      </div>
      <button id="submitBtn" type="submit">Add Item</button>
    </form>
  </div>

  <!-- Product grid -->
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" hidden>No items yet. Add one above.</div>

</div>

<div id="toast" class="toast"></div>

<script>
const API = '/api/items'
const grid = document.getElementById('grid')
const empty = document.getElementById('empty')
const form = document.getElementById('addForm')
const btn = document.getElementById('submitBtn')
const toastEl = document.getElementById('toast')

function showToast(msg) {
  toastEl.textContent = msg
  toastEl.classList.add('show')
  setTimeout(() => toastEl.classList.remove('show'), 3000)
}

async function loadItems() {
  const res = await fetch(API)
  const items = await res.json()
  if (items.length === 0) {
    grid.innerHTML = ''
    empty.hidden = false
    return
  }
  empty.hidden = true
  grid.innerHTML = items.map(item => {
    const isVideo = item.video_url
    const src = isVideo ? item.video_url : item.image_url
    return `
      <div class="card">
        ${isVideo
          ? `<video class="card-img" muted loop playsinline><source src="${src}" type="video/mp4"></video>`
          : `<img class="card-img" src="${src}" alt="${item.title}" loading="lazy" onerror="this.style.display='none'">`
        }
        <div class="card-body">
          <h3>${item.title}</h3>
          <div class="price">$${parseFloat(item.price).toFixed(2)}</div>
          ${item.description ? `<p>${item.description}</p>` : ''}
          <div class="meta">ID: ${item.id}</div>
        </div>
      </div>
    `
  }).join('')
}

form.addEventListener('submit', async (e) => {
  e.preventDefault()
  btn.disabled = true
  btn.textContent = 'Adding...'

  const fd = new FormData()
  fd.append('title', document.getElementById('title').value)
  fd.append('price', document.getElementById('price').value)
  fd.append('description', document.getElementById('description').value)
  fd.append('file', document.getElementById('file').files[0])

  try {
    const res = await fetch(API, { method: 'POST', body: fd })
    if (!res.ok) throw new Error(await res.text())
    showToast('Item added')
    form.reset()
    await loadItems()
  } catch (err) {
    showToast('Error: ' + err.message)
  } finally {
    btn.disabled = false
    btn.textContent = 'Add Item'
  }
})

loadItems()
</script>
</body>
</html>
